name: CI

on:
  push:
    tags-ignore:
    - 'v*'
    branches:
    - "main"
  pull_request:
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci:
    permissions:
      actions: read
      contents: read
      security-events: write
    uses: smallstep/workflows/.github/workflows/goCI.yml@main
    with:
      run-build: false
      run-codeql: true
      codeql-build-cmd: 'go build ./...'
    secrets: inherit
